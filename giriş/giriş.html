
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyLiveArea</title>
  <link rel="stylesheet" href="./giriş.css">
</head>
<body>
<header class="header">
        
        <div class="header-left">
           <div class="logo"> 
               <img src="../money emblem.png" alt="money-amblem-01" style="width: 100%; height: 100%; border-radius: 50%;" />
           </div> 
           <h2 class="site-title" style="color: #fff; margin: 0;">MoneyLiveArea</h2>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="window.location.href='../index.html'">Ana Sayfa</button>
        </div>

    </header>
  <div class="form-wrapper">
    <div class="form-container">
      
      <form id="girişForm">

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="e-mail">
        </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="password">
          </div>
        <button type="submit" class="button button--success">Giriş Yap</button>
      </form>

    </div>
  </div>

  <script src="./giriş.js"></script>
</body>
</html>
